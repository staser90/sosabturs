<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — SO SAB</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      line-height: 1.5;
      color: #1e293b;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      background: #fff;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
      color: white;
      padding: 26px 24px;
      text-align: center;
    }
    .header h1 {
      margin: 0 0 6px 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .header .sub { font-size: 13px; opacity: 0.95; margin: 0; }
    .icon { font-size: 40px; margin-bottom: 8px; }
    .section { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; }
    .section:last-of-type { border-bottom: none; }
    .title {
      color: #ea580c;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 14px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #fed7aa;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      padding: 8px 0;
      font-size: 14px;
    }
    .label { color: #64748b; font-weight: 600; }
    .value { color: #0f172a; font-weight: 700; text-align: right; max-width: 62%; word-break: break-word; }
    .msg {
      margin: 0;
      padding: 14px 16px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      background: #ea580c;
      color: #fff !important;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 800;
      font-size: 14px;
      margin: 6px 4px 0 0;
    }
    .btn.secondary { background: #334155; }
    .muted { color: #64748b; font-size: 12px; margin: 10px 0 0 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">✉️</div>
      <h1>SO SAB</h1>
      <p class="sub">Mensagem do site</p>
    </div>

    <div class="section">
      <h2 class="title">Remetente</h2>
      <div class="row">
        <span class="label">Nome</span>
        <span class="value">{{ name }}</span>
      </div>
      <div class="row">
        <span class="label">Email</span>
        <span class="value">{{ email }}</span>
      </div>
      <div class="row">
        <span class="label">Assunto</span>
        <span class="value">{{ subject }}</span>
      </div>
    </div>

    <div class="section">
      <h2 class="title">Mensagem</h2>
      <p class="msg">{{ message }}</p>
    </div>

    <div class="section" style="text-align:center;">
      <a class="btn" href="mailto:{{ email }}?subject={{ subject|urlencode }}">Responder</a>
      {% if site_url %}
      <a class="btn secondary" href="{{ site_url }}/contacto.html">Contacto</a>
      {% endif %}
      <p class="muted">Registo também no Admin.</p>
    </div>
  </div>
</body>
</html>
