{% load static %}{% load i18n %}
<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE|default:'pt' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Perfil" %} - SO SAB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'base.css' %}">
  <link rel="stylesheet" href="{% static 'css/whatsapp-widget.css' %}">
</head>
<body data-whatsapp="2389991144">

{% include 'includes/navbar.html' with variant='profile' %}

<section class="pt-24 pb-20 px-6">
  <div class="max-w-xl mx-auto">
    <h2 class="text-3xl mb-8">{% trans "O meu perfil" %}</h2>

    <div id="profile-login-required" class="hidden bg-slate-900 p-6 rounded-xl text-center">
      <p class="text-gray-400 mb-4">{% trans "Tem de iniciar sessão para ver o seu perfil." %}</p>
      <a href="{% url 'login' %}" class="inline-block bg-orange-500 px-6 py-2 rounded hover:bg-orange-600 transition">{% trans "Entrar" %}</a>
    </div>

    <div id="profile-content" class="hidden space-y-8">
      <div id="profile-alert" class="hidden p-4 rounded-xl text-sm" role="alert"></div>

      <div class="bg-slate-900 p-6 rounded-xl space-y-4">
        <h3 class="text-lg font-bold text-orange-400">{% trans "Dados da conta" %}</h3>
        <form id="profile-form" class="space-y-4">
          <div>
            <label for="pf_username" class="block mb-2 text-sm text-gray-400">{% trans "Utilizador" %}</label>
            <input type="text" id="pf_username" readonly
                   class="w-full p-3 rounded bg-slate-800/50 border border-slate-700 text-gray-500 cursor-not-allowed">
          </div>
          <div>
            <label for="pf_first_name" class="block mb-2 text-sm text-gray-400">{% trans "Nome" %}</label>
            <input type="text" name="first_name" id="pf_first_name"
                   class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-orange-500 focus:outline-none">
          </div>
          <div>
            <label for="pf_last_name" class="block mb-2 text-sm text-gray-400">{% trans "Apelido" %}</label>
            <input type="text" name="last_name" id="pf_last_name"
                   class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-orange-500 focus:outline-none">
          </div>
          <div>
            <label for="pf_email" class="block mb-2 text-sm text-gray-400">{% trans "Email" %}</label>
            <input type="email" name="email" id="pf_email" required
                   class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-orange-500 focus:outline-none">
          </div>
          <button type="submit" class="w-full bg-orange-500 py-3 rounded hover:bg-orange-600 transition font-bold">
            {% trans "Guardar alterações" %}
          </button>
        </form>
      </div>

      <div class="bg-slate-900 p-6 rounded-xl space-y-4">
        <h3 class="text-lg font-bold text-orange-400">{% trans "Alterar palavra-passe" %}</h3>
        <form id="password-form" class="space-y-4">
          <div>
            <label for="pf_old_password" class="block mb-2 text-sm text-gray-400">{% trans "Palavra-passe atual" %}</label>
            <input type="password" id="pf_old_password" autocomplete="current-password" required
                   class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-orange-500 focus:outline-none">
          </div>
          <div>
            <label for="pf_new_password" class="block mb-2 text-sm text-gray-400">{% trans "Nova palavra-passe" %}</label>
            <input type="password" id="pf_new_password" autocomplete="new-password" required
                   class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-orange-500 focus:outline-none">
          </div>
          <button type="submit" class="w-full border border-orange-500 py-3 rounded hover:bg-orange-500/10 transition font-bold">
            {% trans "Alterar palavra-passe" %}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

<script>
(function() {
  var token = localStorage.getItem('access_token');
  var loginRequired = document.getElementById('profile-login-required');
  var content = document.getElementById('profile-content');
  var alertEl = document.getElementById('profile-alert');

  function showAlert(kind, msg) {
    alertEl.textContent = msg;
    alertEl.classList.remove('hidden', 'bg-green-900/50', 'border-green-500', 'text-green-200', 'bg-red-900/50', 'border-red-500', 'text-red-200');
    if (kind === 'ok') {
      alertEl.classList.add('bg-green-900/50', 'border', 'border-green-500', 'text-green-200');
    } else {
      alertEl.classList.add('bg-red-900/50', 'border', 'border-red-500', 'text-red-200');
    }
    alertEl.classList.remove('hidden');
  }

  function hideAlert() {
    alertEl.classList.add('hidden');
  }

  function apiErrorMessage(body) {
    if (!body || typeof body !== 'object') return null;
    if (body.detail) return String(body.detail);
    if (body.error) return String(body.error);
    for (var k in body) {
      if (!Object.prototype.hasOwnProperty.call(body, k)) continue;
      var v = body[k];
      if (Array.isArray(v) && v.length) return String(v[0]);
      if (typeof v === 'string') return v;
    }
    return null;
  }

  if (!token) {
    loginRequired.classList.remove('hidden');
    return;
  }

  fetch('/api/auth/me/', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) {
      if (!r.ok) {
        if (r.status === 401) {
          loginRequired.classList.remove('hidden');
          return null;
        }
        throw new Error('load');
      }
      return r.json();
    })
    .then(function(data) {
      if (!data || !data.user) return;
      var u = data.user;
      document.getElementById('pf_username').value = u.username || '';
      document.getElementById('pf_first_name').value = u.first_name || '';
      document.getElementById('pf_last_name').value = u.last_name || '';
      document.getElementById('pf_email').value = u.email || '';
      content.classList.remove('hidden');
    })
    .catch(function() {
      showAlert('err', '{% trans "Não foi possível carregar o perfil." %}');
      content.classList.remove('hidden');
    });

  document.getElementById('profile-form').addEventListener('submit', function(e) {
    e.preventDefault();
    hideAlert();
    var t = localStorage.getItem('access_token');
    if (!t) return;
    var body = {
      first_name: document.getElementById('pf_first_name').value.trim(),
      last_name: document.getElementById('pf_last_name').value.trim(),
      email: document.getElementById('pf_email').value.trim()
    };
    fetch('/api/auth/update-profile/', {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + t,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    })
    .then(function(r) {
      return r.json().then(function(j) { return { ok: r.ok, status: r.status, body: j }; });
    })
    .then(function(res) {
      if (res.ok) {
        showAlert('ok', '{% trans "Perfil atualizado com sucesso." %}');
      } else {
        var msg = apiErrorMessage(res.body) || '{% trans "Erro ao guardar." %}';
        showAlert('err', msg);
      }
    })
    .catch(function() {
      showAlert('err', '{% trans "Erro de rede. Tente novamente." %}');
    });
  });

  document.getElementById('password-form').addEventListener('submit', function(e) {
    e.preventDefault();
    hideAlert();
    var t = localStorage.getItem('access_token');
    if (!t) return;
    var oldP = document.getElementById('pf_old_password').value;
    var newP = document.getElementById('pf_new_password').value;
    fetch('/api/auth/change-password/', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + t,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ old_password: oldP, new_password: newP })
    })
    .then(function(r) {
      return r.json().then(function(j) { return { ok: r.ok, body: j }; });
    })
    .then(function(res) {
      if (res.ok) {
        document.getElementById('pf_old_password').value = '';
        document.getElementById('pf_new_password').value = '';
        showAlert('ok', res.body.message || '{% trans "Palavra-passe alterada com sucesso." %}');
      } else {
        var msg = (res.body && res.body.error) || '{% trans "Não foi possível alterar a palavra-passe." %}';
        showAlert('err', msg);
      }
    })
    .catch(function() {
      showAlert('err', '{% trans "Erro de rede. Tente novamente." %}');
    });
  });
})();
</script>
<script src="{% static 'js/whatsapp-chatbot.js' %}"></script>
</body>
</html>
