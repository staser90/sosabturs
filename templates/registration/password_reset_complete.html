{% load static %}{% load i18n %}
<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE|default:'pt' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Senha alterada" %} - SO SAB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'base.css' %}">
</head>
<body>

<header class="navbar flex justify-between items-center p-5">
  <h1 class="text-orange-500 font-bold text-xl"><a href="{% url 'home' %}">SO SAB</a></h1>
</header>

<section class="pt-32 max-w-md mx-auto px-6 text-center">
  <div class="bg-slate-900 p-8 rounded-xl">
    <div class="text-5xl mb-4">✅</div>
    <h2 class="text-2xl font-bold mb-4">{% trans "Senha alterada" %}</h2>
    <p class="text-gray-400 mb-6">
      {% trans "A sua senha foi redefinida com sucesso. Pode entrar com a nova senha." %}
    </p>
    <a href="{% url 'login' %}" class="inline-block bg-orange-500 px-6 py-3 rounded hover:bg-orange-600 transition">
      {% trans "Entrar" %}
    </a>
  </div>
</section>

</body>
</html>
