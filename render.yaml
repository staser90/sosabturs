# Blueprint Render: https://render.com/docs/blueprint-spec
# Criar PostgreSQL no painel e ligar ao serviço (DATABASE_URL é injetado automaticamente).
services:
  - type: web
    name: tours-saas
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn tours_saas.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      # Definir no painel (ou aqui com generateValue/sync):
      # DJANGO_SECRET_KEY, FRONTEND_URL, CSRF_TRUSTED_ORIGINS, CORS_ALLOWED_ORIGINS,
      # ALLOWED_HOSTS, STRIPE_*, etc. — ver DEPLOY_RENDER.md
